<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gesture Todo</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Mode selector -->
<div id="mode-selector">
  <button class="mode-btn active" data-mode="todo">TODO</button>
  <button class="mode-btn" data-mode="game">FLAPPY</button>
</div>

<!-- Todo app -->
<div id="app">
  <!-- Zone labels -->
  <div class="zone-label zone-label-supply">NEW</div>
  <div class="zone-label zone-label-edit">EDIT</div>
  <div class="zone-label zone-label-saved">SAVED</div>
  <div class="zone-label zone-label-complete">COMPLETE</div>

  <!-- Zone outlines -->
  <div class="zone zone-supply" id="zone-supply"></div>
  <div class="zone zone-edit" id="zone-edit"></div>
  <div class="zone zone-saved" id="zone-saved"></div>
  <div class="zone zone-complete" id="zone-complete"></div>

  <!-- Black hole center -->
  <div id="black-hole">
    <div class="bh-ring bh-ring-1"></div>
    <div class="bh-ring bh-ring-2"></div>
    <div class="bh-ring bh-ring-3"></div>
    <div class="bh-core"></div>
  </div>

  <!-- Card container -->
  <div id="card-container"></div>

  <!-- Hand dots layer -->
  <canvas id="hand-canvas"></canvas>

  <!-- Edit input (appears when card is in edit zone) -->
  <input type="text" id="edit-input" class="hidden" placeholder="Type your task..." maxlength="80" autocomplete="off">

  <!-- HUD -->
  <div id="hud">
    <span id="hud-hands">HANDS: 0</span>
    <span id="hud-status"></span>
  </div>
</div>

<!-- Game -->
<div id="game" class="hidden">
  <canvas id="game-canvas"></canvas>
  <div id="game-score">SCORE: 0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
<script src="game.js"></script>
</body>
</html>
